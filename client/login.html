<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>로그인 | 아무 말 대잔치</title>

  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/login.css" />
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <h1 class="header__title">아무 말 대잔치</h1>
    </div>
  </header>

  <main class="main">
    <section class="login-section">
      <h2 class="page-title">로그인</h2>

      <form id="loginForm" class="login-form">
        <div class="form-fields">
          <div class="form-group">
            <label for="email" class="form-label">이메일</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="이메일을 입력하세요"
              required
            />
          </div>

          <p class="helper-text" id="emailHelperText">* helper text</p>

          <div class="form-group">
            <label for="password" class="form-label">비밀번호</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="비밀번호를 입력하세요"
              required
            />
          </div>

          <p class="helper-text" id="passwordHelperText">* helper text</p>
        </div>

        <button type="submit" class="login-button" id="loginButton">
          로그인
        </button>
      </form>

      <button type="button" class="signup-button" id="signupButton">
        회원가입
      </button>
    </section>
  </main>

  <script src="./js/login.js"></script>
</body>
</html>
