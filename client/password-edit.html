<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>비밀번호 수정 | 아무 말 대잔치</title>

  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/password-edit.css" />
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <h1 class="header__title">아무 말 대잔치</h1>

      <button type="button" class="profile-button" id="profileMenuButton" aria-label="프로필 메뉴 열기">
        <img src="./assets/images/profile.png" alt="프로필 이미지" />
      </button>
    </div>
  </header>

  <main class="main">
    <section class="password-edit-section">
      <h2 class="page-title">비밀번호 수정</h2>

      <form id="passwordEditForm" class="password-edit-form">
        <div class="form-fields">
          <div class="form-group">
            <label for="password" class="form-label">비밀번호</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="비밀번호를 입력하세요"
            />
            <p class="helper-text" id="passwordHelperText">* helper text</p>
          </div>

          <div class="form-group">
            <label for="passwordConfirm" class="form-label">비밀번호 확인</label>
            <input
              type="password"
              id="passwordConfirm"
              name="passwordConfirm"
              class="form-input"
              placeholder="비밀번호를 한번 더 입력하세요"
            />
            <p class="helper-text" id="passwordConfirmHelperText">* helper text</p>
          </div>
        </div>

        <button type="submit" class="submit-button" id="submitButton">
          수정하기
        </button>
      </form>

			<div class="toast is-hidden" id="passwordEditToast">
  			수정완료
			</div>
    </section>
  </main>

  <script src="./js/password-edit.js"></script>
</body>
</html>
