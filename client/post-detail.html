<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>게시글 상세 | 아무 말 대잔치</title>

  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/post-detail.css" />
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <button type="button" class="back-button" aria-label="뒤로 가기">
        ‹
      </button>

      <h1 class="header__title">아무 말 대잔치</h1>

      <button type="button" class="profile-button" aria-label="프로필 메뉴 열기">
        <img src="./assets/images/profile.png" alt="프로필 이미지" />
      </button>
    </div>
  </header>

  <main class="main"></main>

  <div class="modal-overlay is-hidden" id="deletePostModal">
    <section
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="deletePostModalTitle"
    >
      <h2 class="modal__title" id="deletePostModalTitle">
        게시글을 삭제하시겠습니까?
      </h2>

      <p class="modal__description">
        삭제한 내용은 복구 할 수 없습니다.
      </p>

      <div class="modal__actions">
        <button type="button" class="modal__button modal__button--cancel" id="cancelDeleteButton">
          취소
        </button>

        <button type="button" class="modal__button modal__button--confirm" id="confirmDeleteButton">
          확인
        </button>
      </div>
    </section>
  </div>

  <div class="modal-overlay is-hidden" id="deleteCommentModal">
    <section
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="deleteCommentModalTitle"
    >
      <h2 class="modal__title" id="deleteCommentModalTitle">
        댓글을 삭제하시겠습니까?
      </h2>

      <p class="modal__description">
        삭제한 내용은 복구 할 수 없습니다.
      </p>

      <div class="modal__actions">
        <button
          type="button"
          class="modal__button modal__button--cancel"
          id="cancelDeleteCommentButton"
        >
          취소
        </button>

        <button
          type="button"
          class="modal__button modal__button--confirm"
          id="confirmDeleteCommentButton"
        >
          확인
        </button>
      </div>
    </section>
  </div>

  <script type="module" src="./js/post-detail.js"></script>
</body>
</html>
