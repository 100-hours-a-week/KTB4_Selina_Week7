<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>게시글 작성 | 아무 말 대잔치</title>

  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/post-form.css" />
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <button type="button" class="back-button" aria-label="뒤로 가기">
        ‹
      </button>

      <h1 class="header__title">아무 말 대잔치</h1>

      <button type="button" class="profile-button" aria-label="프로필 메뉴 열기">
        <img src="./assets/images/profile.png" alt="프로필 이미지" />
      </button>
    </div>
  </header>

  <main class="main">
    <section class="form-section">
      <h2 class="page-title">게시글 작성</h2>

      <form id="postForm" class="post-form">
        <div class="form-group">
          <label for="title" class="form-label">제목*</label>

          <input
            type="text"
            id="title"
            name="title"
            class="title-input"
            placeholder="제목을 입력해주세요. (최대 26글자)"
            maxlength="26"
            required
          />
        </div>

        <div class="form-group form-group--content">
          <label for="content" class="form-label">내용*</label>

          <textarea
            id="content"
            name="content"
            class="content-textarea"
            placeholder="내용을 입력해주세요."
            required
          ></textarea>

          <p class="helper-text" id="contentHelperText">* helper text</p>
        </div>

        <div class="form-group form-group--image">
          <label for="postImage" class="form-label">이미지</label>

          <div class="file-row">
            <input
              type="file"
              id="postImage"
              name="postImage"
              class="file-input"
              accept="image/*"
            />
          </div>
        </div>

        <button type="submit" class="submit-button">
          완료
        </button>
      </form>
    </section>
  </main>

  <script src="./js/post-form.js"></script>
</body>
</html>
