<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>아무 말 대잔치</title>

  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/posts.css" />
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <h1 class="header__title">아무 말 대잔치</h1>

      <button type="button" class="profile-button" aria-label="프로필 메뉴 열기">
        <img src="./assets/images/profile.png" alt="프로필 이미지" />
      </button>
    </div>
  </header>

  <main class="main">
    <section class="intro-section">
      <p>
        안녕하세요,<br />
        아무 말 대잔치 <strong>게시판</strong> 입니다.
      </p>
    </section>

    <section class="board-section">
      <div class="board-toolbar">
        <button type="button" class="write-button" id="writePostButton">
          게시글 작성
        </button>
      </div>

      <div class="post-list" id="postList"></div>
    </section>
  </main>

  <script type="module" src="./js/posts.js"></script>
</body>
</html>
