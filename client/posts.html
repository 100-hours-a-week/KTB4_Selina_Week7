<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>아무 말 대잔치</title>

  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/posts.css" />
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <h1 class="header__title">아무 말 대잔치</h1>

      <button type="button" class="profile-button" aria-label="프로필 메뉴 열기">
        <img src="./assets/images/profile.png" alt="프로필 이미지" />
      </button>
    </div>
  </header>

  <main class="main">
    <section class="intro-section">
      <p>
        안녕하세요,<br />
        아무 말 대잔치 <strong>게시판</strong> 입니다.
      </p>
    </section>

    <section class="board-section">
      <div class="board-toolbar">
        <a href="./post-form.html" class="write-button">게시글 작성</a>
      </div>

      <div class="post-list" id="postList">
        <article class="post-card" data-post-id="1">
          <div class="post-card__content">
            <div class="post-card__top">
              <div>
                <h2 class="post-card__title">제목 1</h2>

                <div class="post-card__meta">
                  <span>좋아요 0</span>
                  <span>댓글 0</span>
                  <span>조회수 0</span>
                </div>
              </div>

              <time class="post-card__date">2021-01-01 00:00:00</time>
            </div>
          </div>

          <div class="post-card__author">
            <div class="author-profile"></div>
            <span class="author-name">더미 작성자 1</span>
          </div>
        </article>

        <article class="post-card" data-post-id="2">
          <div class="post-card__content">
            <div class="post-card__top">
              <div>
                <h2 class="post-card__title">제목 1</h2>

                <div class="post-card__meta">
                  <span>좋아요 0</span>
                  <span>댓글 0</span>
                  <span>조회수 0</span>
                </div>
              </div>

              <time class="post-card__date">2021-01-01 00:00:00</time>
            </div>
          </div>

          <div class="post-card__author">
            <div class="author-profile"></div>
            <span class="author-name">더미 작성자 1</span>
          </div>
        </article>

        <article class="post-card" data-post-id="3">
          <div class="post-card__content">
            <div class="post-card__top">
              <div>
                <h2 class="post-card__title">제목 1</h2>

                <div class="post-card__meta">
                  <span>좋아요 0</span>
                  <span>댓글 0</span>
                  <span>조회수 0</span>
                </div>
              </div>

              <time class="post-card__date">2021-01-01 00:00:00</time>
            </div>
          </div>

          <div class="post-card__author">
            <div class="author-profile"></div>
            <span class="author-name">더미 작성자 1</span>
          </div>
        </article>
      </div>
    </section>
  </main>

  <script src="./js/posts.js"></script>
</body>
</html>
