<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>회원정보수정 | 아무 말 대잔치</title>

  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/profile-edit.css" />
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <h1 class="header__title">아무 말 대잔치</h1>

      <div class="profile-menu-area">
        <button type="button" class="profile-button" id="profileMenuButton" aria-label="프로필 메뉴 열기">
          <img src="./assets/images/profile.png" alt="프로필 이미지" />
        </button>

        <nav class="profile-dropdown is-hidden" id="profileDropdown">
          <button type="button" class="profile-dropdown__item" id="profileEditButton">
            회원정보수정
          </button>

          <button type="button" class="profile-dropdown__item" id="passwordEditButton">
            비밀번호수정
          </button>

          <button type="button" class="profile-dropdown__item" id="logoutButton">
            로그아웃
          </button>
        </nav>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="profile-edit-section">
      <h2 class="page-title">회원정보수정</h2>

      <form id="profileEditForm" class="profile-edit-form">
        <div class="profile-image-section">
          <label class="profile-image-label">프로필 사진</label>

          <div class="profile-image-wrapper">
            <img
              src="./assets/images/profile.png"
              alt="현재 프로필 이미지"
              class="profile-image"
              id="profilePreview"
            />

            <input
              type="file"
              id="profileImage"
              name="profileImage"
              class="profile-image-input"
              accept="image/*"
            />

            <label for="profileImage" class="profile-change-button">
              변경
            </label>
          </div>
        </div>

        <div class="form-fields">
          <div class="form-group form-group--email">
            <label class="form-label">이메일</label>
            <p class="email-text" id="emailText">startupcode@gmail.com</p>
          </div>

          <div class="form-group">
            <label for="nickname" class="form-label">닉네임</label>

            <input
              type="text"
              id="nickname"
              name="nickname"
              class="form-input"
              placeholder="닉네임을 입력하세요"
            />

            <p class="helper-text" id="nicknameHelperText"></p>
          </div>

          <button
            type="submit"
            class="submit-button"
            id="editButton"
            disabled
          >
            수정하기
          </button>
        </div>
      </form>

      <button type="button" class="withdraw-button" id="withdrawButton">
        회원 탈퇴
      </button>

      <div class="toast is-hidden" id="editCompleteToast">
        수정완료
      </div>
    </section>
  </main>

	<div class="modal-overlay is-hidden" id="withdrawModal">
		<section
			class="modal"
			role="dialog"
			aria-modal="true"
			aria-labelledby="withdrawModalTitle"
		>
			<h2 class="modal__title" id="withdrawModalTitle">
				회원탈퇴 하시겠습니까?
			</h2>

			<p class="modal__description">
				작성된 게시글과 댓글은 삭제됩니다.
			</p>

			<div class="modal__actions">
				<button type="button" class="modal__button modal__button--cancel" id="cancelWithdrawButton">
					취소
				</button>

				<button type="button" class="modal__button modal__button--confirm" id="confirmWithdrawButton">
					확인
				</button>
			</div>
		</section>
	</div>

  <script type="module" src="./js/profile-edit.js"></script>
</body>
</html>
