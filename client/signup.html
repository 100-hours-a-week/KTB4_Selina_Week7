<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>회원가입 | 아무 말 대잔치</title>

  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/signup.css" />
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <button type="button" class="back-button" id="backButton" aria-label="뒤로 가기">
        ‹
      </button>

      <h1 class="header__title">아무 말 대잔치</h1>
    </div>
  </header>

  <main class="main">
    <section class="signup-section">
      <h2 class="page-title">회원가입</h2>

      <form id="signupForm" class="signup-form">
        <div class="profile-upload-area">
          <label class="profile-label">프로필 사진</label>
          <p class="helper-text" id="profileHelperText">* helper text</p>

          <div class="profile-image-wrapper">
            <input
              type="file"
              id="profileImage"
              name="profileImage"
              class="profile-image-input"
              accept="image/*"
            />

            <label for="profileImage" class="profile-image-button" aria-label="프로필 사진 선택">
              <span class="profile-plus">+</span>
            </label>
          </div>
        </div>

        <div class="form-fields">
          <div class="form-group">
            <label for="email" class="form-label">이메일*</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="이메일을 입력하세요"
            />
            <p class="helper-text" id="emailHelperText">* helper text</p>
          </div>

          <div class="form-group">
            <label for="password" class="form-label">비밀번호*</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="비밀번호를 입력하세요"
            />
            <p class="helper-text" id="passwordHelperText">* helper text</p>
          </div>

          <div class="form-group">
            <label for="passwordConfirm" class="form-label">비밀번호 확인*</label>
            <input
              type="password"
              id="passwordConfirm"
              name="passwordConfirm"
              class="form-input"
              placeholder="비밀번호를 한번 더 입력하세요"
            />
            <p class="helper-text" id="passwordConfirmHelperText">* helper text</p>
          </div>

          <div class="form-group">
            <label for="nickname" class="form-label">닉네임*</label>
            <input
              type="text"
              id="nickname"
              name="nickname"
              class="form-input"
              placeholder="닉네임을 입력하세요"
            />
            <p class="helper-text" id="nicknameHelperText">* helper text</p>
          </div>

          <button type="submit" class="signup-button" id="signupButton">
            회원가입
          </button>
        </div>
      </form>

      <button type="button" class="login-link-button" id="loginButton">
        로그인하러 가기
      </button>
    </section>
  </main>

  <script src="./js/signup.js"></script>
</body>
</html>
